name: Playwright Tests Workflow

on:
  workflow_dispatch:
    inputs:
      test_suites:
        description: 'Select test suites to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - TestCases_TaggedWithAbhinav
          - TestCases_TaggedWithJohn

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine test suites to run
        id: set-matrix
        run: |
          SELECTED_SUITE="${{ github.event.inputs.test_suites }}"

          if [ "$SELECTED_SUITE" != "all" ]; then

            # Map suite → grep
            case "$SELECTED_SUITE" in
              "TestCases_TaggedWithAbhinav")
                GREP="^(?=.*@abhinav)"
                ;;
              "TestCases_TaggedWithJohn")
                GREP="^(?=.*@john)"
                ;;
              *)
                GREP=""
                ;;
            esac

            echo "Selected suite: $SELECTED_SUITE"
            echo "Using grep: $GREP"

            # 🔥 Check if any tests exist
            MATCH_COUNT=$(npx playwright test --grep "$GREP" --list | wc -l)

            echo "Matched tests: $MATCH_COUNT"

            if [ "$MATCH_COUNT" -eq 0 ]; then
              echo "No tests found. Setting empty matrix."
              echo "matrix={\"test_suite\":[]}" >> $GITHUB_OUTPUT
            else
              echo "matrix={\"test_suite\":[{\"name\":\"$SELECTED_SUITE\",\"grep\":\"$GREP\"}]}" >> $GITHUB_OUTPUT
            fi

          else
            echo "Running full suite"

            echo "matrix={\"test_suite\":[
              {\"name\":\"TestCases_TaggedWithAbhinav\",\"grep\":\"^(?=.*@abhinav)\"},
              {\"name\":\"TestCases_TaggedWithJohn\",\"grep\":\"^(?=.*@john)\"}
            ]}" >> $GITHUB_OUTPUT
          fi

  run-tests:
    needs: setup-matrix
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    container:
      image: mcr.microsoft.com/playwright:v1.42.1-jammy

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run tests
        run: |
          echo "Running suite: ${{ matrix.test_suite.name }}"
          npx playwright test --grep "${{ matrix.test_suite.grep }}"