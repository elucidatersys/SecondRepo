name: Playwright Tests Workflow -  [WorkFlow Name]
on: 
  workflow_dispatch:
    inputs:
      test_suites:
        description: 'Select test suites to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - DFB_Includecarrier
          - DFB_Waterfall-manualposting
          - DFB_Waterfall-autoposting
          - DFB_FieldValidation
          - DFB_Greenscreen
          - DFB_Matchbid
          - DFB_Waterfall-manualposting-OfferRateOn
          - DFB_Waterfall-autoposting-OfferRateOn
          - DFB_Bidding
          - DFB_CargoValue
          - DFB_CarrierAutoAccept
          - DFB_PostAutomationRule
jobs:
  testJobName:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.42.1-jammy
    steps:
      - name: Step 1 is to get the code
        uses: actions/checkout@v3
      - name: Step 2 is to install dependencies
        run: npm install
      - name: Step 3 is to install playwright with dependencies
        run: npx playwright install --with-deps
      - name: Step 4 is to run the playwright tests
        run: npx playwright test first.spec.ts
