name: Playwright Tests Workflow 
on: push
jobs:
  testJobName:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 is to get the code 
        uses: actions/checkout@v3
      - name: Step 2 is to setup node
        uses: actions/setup-node@v3   
        with:
          node-version: '18'
      - name: Step 3 is to install dependencies
        run: npm install
      - name: Step 4 is to run the tests
        run: npx playwright test